app = 'deep-research-agent'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 50
    soft_limit = 25

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    path = '/'

[[services]]
  internal_port = 8080
  protocol = 'tcp'

  [services.concurrency]
    type = 'connections'
    hard_limit = 50

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1

